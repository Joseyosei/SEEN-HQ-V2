<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/seen-hq-logo.jpg" />
    <link rel="apple-touch-icon" href="/seen-hq-logo.jpg" />
    <title>Seen HQ - Get Seen. Get Sold.</title>
    <meta name="description" content="Professional short-form video promotion for UK businesses, property sellers, restaurants, and more. We film, we post, we promote - you get results." />
    <link rel="canonical" href="https://seenhq.co.uk" />

    <meta property="og:title" content="Seen HQ - Get Seen. Get Sold." />
    <meta property="og:description" content="Professional short-form video promotion for UK businesses and sellers." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div style="font-family:sans-serif;padding:2rem;color:#111"><h2>Startup error</h2><pre style="background:#fee;padding:1rem;border-radius:8px;white-space:pre-wrap">' + msg + (err ? '\n' + err.stack : '') + '</pre></div>';
        }
      };
      window.addEventListener('unhandledrejection', function(e) {
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div style="font-family:sans-serif;padding:2rem;color:#111"><h2>Unhandled rejection</h2><pre style="background:#fee;padding:1rem;border-radius:8px;white-space:pre-wrap">' + (e.reason ? (e.reason.stack || e.reason) : e) + '</pre></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
